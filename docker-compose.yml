version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: ota_postgres
    environment:
      POSTGRES_DB: ota_platform
      POSTGRES_USER: ota_user
      POSTGRES_PASSWORD: ota_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ota_user -d ota_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ota_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: ota_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Development services (use with --profile dev)
  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    container_name: ota_api
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://ota_user:ota_password@postgres:5432/ota_platform
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      JWT_SECRET: dev_jwt_secret_change_in_production
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./packages/api:/app
      - /app/node_modules
    profiles:
      - dev

  dashboard:
    build:
      context: .
      dockerfile: packages/dashboard/Dockerfile
    container_name: ota_dashboard
    ports:
      - "3001:3000"
    environment:
      VITE_API_URL: http://localhost:3000
    depends_on:
      - api
    volumes:
      - ./packages/dashboard:/app
      - /app/node_modules
    profiles:
      - dev

volumes:
  postgres_data:
  redis_data:
  minio_data:
